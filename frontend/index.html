<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KVR Tata Motors — internal vehicle delivery tracker and workflow management system for efficient booking, dispatch, and department coordination." />
    <title>KVR Tata Motors - Vehicle Delivery Tracker & Workflow Manager</title>

    <!-- Preconnect to Google Fonts origin so the DNS + TLS handshake happens in parallel with page load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Async font loading — preload fetches the CSS early without blocking render.
      onload swaps rel to 'stylesheet' once downloaded (the this.media='all' trick).
      font-display:swap is already set in the Google Fonts URL so text stays visible
      while the font file downloads (no invisible text flash).
    -->
    <link rel="preload"
          href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'" />
    <!-- Fallback for no-JS environments -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
